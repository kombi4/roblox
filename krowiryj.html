<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verification</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at top, #1b1f2a, #0d0f14);
    overflow: hidden;
}

/* background glow */
body::before {
    content: "";
    position: absolute;
    width: 700px;
    height: 700px;
    background: rgba(255,255,255,0.06);
    filter: blur(140px);
    top: -250px;
    left: -250px;
}

/* logo */
.logo {
    width: 190px;
    margin-bottom: 28px;
}

/* card */
.card {
    text-align: center;
    background: rgba(25, 28, 38, 0.92);
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.65);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    transition: 0.2s ease;
}

.card:hover {
    transform: translateY(-4px);
}

.card img {
    width: 240px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
}

.title {
    margin-top: 12px;
    color: #ffffff;
    font-size: 18px;
    font-weight: bold;
}

.subtitle {
    margin-top: 4px;
    color: #9aa0aa;
    font-size: 12px;
}

button {
    margin-top: 16px;
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #ff2d2d, #b30000);
    color: white;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s ease;
    box-shadow: 0 8px 20px rgba(255,0,0,0.25);
}

button:hover {
    transform: scale(1.05);
}

button:active {
    transform: scale(0.98);
}
</style>
</head>
